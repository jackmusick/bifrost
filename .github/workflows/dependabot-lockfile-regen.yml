# Auto-regenerate requirements.lock on Dependabot PRs.
#
# Why: PR #112 pinned every pip dep by sha256 in `requirements.lock`, installed
# with `pip install --require-hashes`. Dependabot only edits `requirements.txt`
# — it does not regenerate the lock — so every Dependabot Python bump leaves
# the lock stale and CI fails until a maintainer regenerates it by hand.
#
# This workflow detects Dependabot PRs that touch `requirements.txt`,
# regenerates `requirements.lock` with the same `pip-compile --generate-hashes`
# command documented at the top of the lock file, and pushes the regenerated
# lock back onto the PR branch. The PR's existing CI re-runs against the
# updated lock, and `dependabot-auto-merge.yml` takes over from there.
#
# Trigger: `pull_request` (not `pull_request_target`) — we only need read
# access to the base repo and write access to the PR branch via the standard
# GITHUB_TOKEN. The job-level `contents: write` permission is what allows the
# push back; the workflow-level permission stays read-only.

name: Regen requirements.lock for Dependabot

on:
  pull_request:
    paths:
      - "requirements.txt"

permissions:
  contents: read

jobs:
  regen:
    # Same gating pattern as dependabot-auto-merge.yml — only run for PRs
    # opened by the Dependabot bot account.
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Check out the PR's head ref so the regenerated lock is committed
          # back to the same branch Dependabot is tracking.
          ref: ${{ github.head_ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate requirements.lock
        # Use the same Python minor as api/Dockerfile's FROM line (3.14-slim).
        # Hash sets are tied to the Python version that resolved them, so
        # regenerating with a different minor would produce a lock the
        # production build can't install with --require-hashes.
        #
        # pip-tools itself is bootstrapped from `requirements-piptools.lock`
        # (a tiny hash-pinned lock that only contains pip-tools + transitive
        # deps) so the install satisfies Scorecard's Pinned-Dependencies
        # check. Regenerate that lock with the same `pip-compile` command
        # documented at the top of the file.
        run: |
          docker run --rm -v "$PWD":/repo -w /repo python:3.14-slim sh -c "
            pip install --quiet --require-hashes -r requirements-piptools.lock
            pip-compile --generate-hashes --output-file=requirements.lock requirements.txt
          "

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain requirements.lock)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add requirements.lock
            git commit -m "chore(deps): regenerate requirements.lock for Dependabot bump"
            git push
          fi
