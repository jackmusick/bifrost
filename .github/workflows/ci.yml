name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    # Skip CI for documentation/config-only changes. The companion workflow
    # ci-noop.yml fires on these same paths and reports the same status-check
    # names (Lint & Type Check, Unit Tests, E2E Tests) so branch protection
    # still sees the required checks reported as green.
    #
    # IMPORTANT: do NOT add .github/workflows/** to this list — workflow
    # changes must always run CI so we catch CI-breaking edits before merge.
    # Also do NOT add **/*.yml, **/*.yaml, **/*.json, or **/*.toml — these
    # cover real config (docker-compose, package-lock, tsconfig, pyproject)
    # that does affect runtime/tests and must run CI.
    #
    # The companion ci-noop.yml `paths:` list MUST stay byte-identical to
    # this `paths-ignore:` list — branch protection relies on the inverse
    # mapping to always report the required check names.
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.gif"
      - "**/*.svg"
      - "**/*.webp"
      - "**/*.ico"
      - ".agents/**"
      - ".claude/**"
      - ".claude-plugin/**"
      - ".codex/**"
      - ".codex-plugin/**"
      - "docs/**"
      - "LICENSE"
      - ".github/CODEOWNERS"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/dependabot.yml"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - ".prettierrc*"
      - ".prettierignore"
      - ".vscode/**"
      - ".idea/**"
  # GitHub merge queue runs CI on a synthetic ref containing
  # main + queued PRs stacked in queue order. Required status
  # checks must fire on this event or the queue blocks forever
  # waiting on absent statuses.
  merge_group:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: gobifrost/bifrost-api
  CLIENT_IMAGE: gobifrost/bifrost-client
  # Legacy image names under jackmusick — kept for dual-publish during namespace
  # migration window. Remove after 2 stable releases or 60 days post-transfer.
  LEGACY_API_IMAGE: jackmusick/bifrost-api
  LEGACY_CLIENT_IMAGE: jackmusick/bifrost-client

permissions:
  contents: read

jobs:
  # =============================================================================
  # Lint & Type Check - Fast, gates all builds alongside unit tests
  # =============================================================================
  lint:
    # Skip on push: main — the merge_group run already covered this
    # commit. Still runs on PRs, queue, tag pushes, and workflow_dispatch.
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Lint & Type Check
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check GitHub Action pins
        run: python3 api/scripts/check_github_action_pins.py

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # Create .venv at the repo root so pyrightconfig.json's
      # `venvPath: ..` + `venv: .venv` resolves the same way locally and in CI.
      # Install runtime deps from the hash-pinned lock file (Scorecard
      # Pinned-Dependencies); pyright is installed from its own hash-pinned
      # lock because --require-hashes forbids unpinned packages and pyright
      # targets a different Python minor (3.12 here vs 3.14 in production)
      # so it can't share requirements.lock.
      #
      # We deliberately do NOT `pip install --upgrade pip` — actions/setup-python
      # already ships a current pip into the venv and any explicit upgrade
      # would be flagged by Scorecard as an unpinned install.
      - name: Install Python deps into .venv
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --require-hashes -r requirements.lock
          ./.venv/bin/pip install --require-hashes -r requirements-pyright.lock

      - name: Ruff
        working-directory: api
        run: ../.venv/bin/ruff check .

      - name: Pyright
        working-directory: api
        run: ../.venv/bin/pyright

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: TypeScript
        working-directory: client
        run: npm run tsc

      - name: ESLint
        working-directory: client
        run: npm run lint

  # =============================================================================
  # Client Unit Tests (Vitest) - Fast, runs on host Node — no Docker needed.
  # Parallel to Unit Tests; does NOT become the critical path.
  # =============================================================================
  test-client-unit:
    # Skip on push: main — covered by the merge_group run.
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Client Unit Tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Vitest
        working-directory: client
        run: npm test

  # =============================================================================
  # Unit Tests - Fast, gates all builds
  # =============================================================================
  test-unit:
    # Skip on push: main — covered by the merge_group run.
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Pre-build dev images via build-push-action for GHA layer caching.
      # docker-compose.test.yml pins all api-stack services to bifrost-test-api-dev:latest
      # and the client service to bifrost-test-client-dev:latest. When
      # BIFROST_SKIP_BUILD=1, test.sh passes --no-build to compose so it reuses
      # these local images instead of rebuilding (which would skip the GHA cache).
      # Cache scope is shared with test-e2e so whichever job runs second gets warm hits.
      - name: Build API dev image (cached)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./api/Dockerfile.dev
          load: true
          tags: bifrost-test-api-dev:latest
          cache-from: type=gha,scope=test-api-dev
          cache-to: type=gha,scope=test-api-dev,mode=max

      - name: Build client dev image (cached)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./client
          file: ./client/Dockerfile.dev
          load: true
          tags: bifrost-test-client-dev:latest
          cache-from: type=gha,scope=test-client-dev
          cache-to: type=gha,scope=test-client-dev,mode=max

      - name: Run unit tests
        env:
          BIFROST_SKIP_BUILD: "1"
        run: |
          chmod +x test.sh
          ./test.sh stack up
          ./test.sh unit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.xml
          flags: api
          name: api-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  # =============================================================================
  # E2E Tests - Sharded across 2 parallel runners. Each shard boots its own
  # isolated test stack (no xdist, no shared services between shards).
  # scripts/e2e_shard.py deterministically allocates test files: heavies
  # bin-packed first, then round-robin in sorted order — adding a file only
  # moves files in shards downstream of the insertion point.
  #
  # The internal matrix job (test-e2e) uses shard names like
  # "E2E Tests (shard 1/2)". The aggregate gate job below (test-e2e-gate)
  # is named EXACTLY "E2E Tests" to match the required status check name —
  # no ruleset edits needed.
  # =============================================================================
  test-e2e:
    # Skip on push: main — covered by the merge_group run.
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    name: E2E Tests (shard ${{ matrix.shard }}/2)
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # See test-unit for caching strategy notes.
      - name: Build API dev image (cached)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./api/Dockerfile.dev
          load: true
          tags: bifrost-test-api-dev:latest
          cache-from: type=gha,scope=test-api-dev
          cache-to: type=gha,scope=test-api-dev,mode=max

      - name: Build client dev image (cached)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./client
          file: ./client/Dockerfile.dev
          load: true
          tags: bifrost-test-client-dev:latest
          cache-from: type=gha,scope=test-client-dev
          cache-to: type=gha,scope=test-client-dev,mode=max

      - name: Run E2E tests (shard ${{ matrix.shard }}/2)
        env:
          BIFROST_SKIP_BUILD: "1"
        run: |
          chmod +x test.sh
          ./test.sh stack up
          mapfile -t shard_files < <(python3 scripts/e2e_shard.py --shard-id ${{ matrix.shard }} --total 2)
          if [ ${#shard_files[@]} -eq 0 ]; then
            echo "ERROR: shard ${{ matrix.shard }} resolved to zero files" >&2
            exit 1
          fi
          echo "Shard ${{ matrix.shard }}/2: ${#shard_files[@]} files"
          ./test.sh "${shard_files[@]}" -v --durations=50

  # Aggregate gate — required check named "E2E Tests" (matches ruleset 15329014).
  # Fails if any shard failed or was cancelled. Runs even when shards fail
  # (if: always()) so branch protection always sees a conclusive result.
  test-e2e-gate:
    if: always() && (github.event_name != 'push' || github.ref != 'refs/heads/main')
    needs: [test-e2e]
    runs-on: ubuntu-latest
    name: E2E Tests
    steps:
      - name: Check shard results
        run: |
          if [ "${{ needs.test-e2e.result }}" != "success" ]; then
            echo "One or more e2e shards failed or were cancelled (result: ${{ needs.test-e2e.result }})"
            exit 1
          fi
          echo "All e2e shards passed."

  # =============================================================================
  # Dev Build - Every push to main, gated by unit tests only
  # =============================================================================
  build-dev:
    # Only fires on push: main — branch protection + merge queue
    # already gated this commit, so no needs: here.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Build Dev Images
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC for keyless cosign signing
      attestations: write # for actions/attest-build-provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          VERSION=$(./scripts/compute-dev-version.sh)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # Surface manifest drift to the job summary. Plugin manifests are updated
      # at tag time (see bifrost-release skill) — between tags the `version`
      # field reflects the last released version, not the current dev version.
      # This step is informational only; it does not fail the build and does
      # not commit anything back. See PR #246 for the rationale (branch
      # protection + commit-back loop avoidance).
      - name: Report plugin manifest drift
        run: |
          DEV_VERSION="${{ steps.version.outputs.version }}"
          {
            echo "## Plugin manifest versions"
            echo ""
            echo "- Computed dev version: \`${DEV_VERSION}\`"
            for manifest in \
              .claude-plugin/plugin.json \
              .codex-plugin/plugin.json \
              plugins/bifrost/.codex-plugin/plugin.json; do
              manifest_version=$(jq -r '.version' "$manifest")
              echo "- Manifest (${manifest}): \`${manifest_version}\`"
            done
            echo ""
            echo "Manifests reflect the last tagged release; they advance at tag time via the bifrost-release skill."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build and push API dev image
        id: build-api
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.API_IMAGE }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ env.API_IMAGE }}:dev
            ghcr.io/${{ env.API_IMAGE }}:sha-${{ steps.version.outputs.short_sha }}
          build-args: |
            BIFROST_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign API dev image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/${{ env.API_IMAGE }}@${{ steps.build-api.outputs.digest }}

      - name: Attest API dev image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ env.API_IMAGE }}
          subject-digest: ${{ steps.build-api.outputs.digest }}
          push-to-registry: true

      - name: Build and push client dev image
        id: build-client
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./client
          file: ./client/Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.CLIENT_IMAGE }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ env.CLIENT_IMAGE }}:dev
            ghcr.io/${{ env.CLIENT_IMAGE }}:sha-${{ steps.version.outputs.short_sha }}
          build-args: |
            VITE_BIFROST_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign client dev image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/${{ env.CLIENT_IMAGE }}@${{ steps.build-client.outputs.digest }}

      - name: Attest client dev image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ env.CLIENT_IMAGE }}
          subject-digest: ${{ steps.build-client.outputs.digest }}
          push-to-registry: true

      # ---------------------------------------------------------------------------
      # Transitional dual-publish to legacy ghcr.io/jackmusick/* namespace.
      # This keeps Keel-polling clusters that pin the old image name converging
      # during the migration window. Sunset: remove after 2 stable releases or
      # 60 days post-transfer to gobifrost, whichever comes first.
      # ---------------------------------------------------------------------------
      - name: Dual-publish dev images to legacy jackmusick namespace
        # Map secret to env var so job-level if-condition can test it
        # (secrets cannot be referenced directly in job if-conditions).
        env:
          GHCR_LEGACY_TOKEN: ${{ secrets.GHCR_LEGACY_TOKEN }}
        if: ${{ env.GHCR_LEGACY_TOKEN != '' }}
        run: |
          echo "$GHCR_LEGACY_TOKEN" | docker login ghcr.io -u jackmusick --password-stdin

          # Retag and push API dev images to legacy namespace
          for tag in \
            "${{ steps.version.outputs.version }}" \
            "dev" \
            "sha-${{ steps.version.outputs.short_sha }}"; do
            docker pull ghcr.io/${{ env.API_IMAGE }}:${tag}
            docker tag  ghcr.io/${{ env.API_IMAGE }}:${tag} ghcr.io/${{ env.LEGACY_API_IMAGE }}:${tag}
            docker push ghcr.io/${{ env.LEGACY_API_IMAGE }}:${tag}
          done

          # Retag and push Client dev images to legacy namespace
          for tag in \
            "${{ steps.version.outputs.version }}" \
            "dev" \
            "sha-${{ steps.version.outputs.short_sha }}"; do
            docker pull ghcr.io/${{ env.CLIENT_IMAGE }}:${tag}
            docker tag  ghcr.io/${{ env.CLIENT_IMAGE }}:${tag} ghcr.io/${{ env.LEGACY_CLIENT_IMAGE }}:${tag}
            docker push ghcr.io/${{ env.LEGACY_CLIENT_IMAGE }}:${tag}
          done

          docker logout ghcr.io

  # =============================================================================
  # Deploy Dry Run - Manual trigger only (workflow_dispatch from any branch).
  # Validates the DO auth chain (token, cluster name, RBAC, label selector)
  # WITHOUT touching any deployment. Used once before merging this PR to
  # confirm the deploy job will succeed when it fires for real.
  # =============================================================================
  deploy-dry-run:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy Dry Run
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f # v2.5.2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save "${{ secrets.DO_CLUSTER_NAME }}"

      - name: Probe cluster reach + RBAC + label selector
        run: |
          set -e
          echo "::group::cluster info"
          kubectl cluster-info
          echo "::endgroup::"

          echo "::group::RBAC — can I patch deployments in the bifrost namespace?"
          kubectl auth can-i patch deployment -n bifrost
          echo "::endgroup::"

          echo "::group::Deployments the real job would restart"
          kubectl -n bifrost get deployment \
            -l app.kubernetes.io/part-of=bifrost,app.kubernetes.io/component!=message-broker \
            -o wide
          echo "::endgroup::"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Bifrost deploy dry run"
            echo ""
            echo "If the step above passed, the real \`deploy-dev\` job will work when this PR merges."
            echo ""
            echo "### Deployments that would be restarted"
            echo ""
            echo '```'
            kubectl -n bifrost get deployment \
              -l app.kubernetes.io/part-of=bifrost,app.kubernetes.io/component!=message-broker \
              -o custom-columns=NAME:.metadata.name,READY:.status.readyReplicas,AVAILABLE:.status.availableReplicas \
              || echo "kubectl unavailable"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # =============================================================================
  # Deploy Dev - Push-to-main only. Rolls the DigitalOcean deployment once
  # the :dev images are published. Targets anything labeled
  # `app.kubernetes.io/part-of=bifrost` in the `bifrost` namespace so new
  # services are picked up automatically. Failures page the maintainer via
  # GitHub's built-in workflow-failure email (no extra wiring).
  # =============================================================================
  deploy-dev:
    # Fires only after build-dev lands a new image on push: main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-dev]
    runs-on: ubuntu-latest
    name: Deploy Dev to DigitalOcean
    # Allow only one deploy at a time; if a newer commit lands mid-rollout we
    # cancel the older deploy so the cluster always converges on HEAD of main.
    concurrency:
      group: deploy-dev
      cancel-in-progress: true

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f # v2.5.2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save "${{ secrets.DO_CLUSTER_NAME }}"

      - name: Roll deployments
        run: |
          kubectl -n bifrost rollout restart deployment \
            -l app.kubernetes.io/part-of=bifrost,app.kubernetes.io/component!=message-broker

      - name: Wait for rollouts
        run: |
          set -e
          # Query the same label selector we restarted, so new services are
          # picked up without editing this workflow.
          DEPLOYMENTS=$(kubectl -n bifrost get deployment \
            -l app.kubernetes.io/part-of=bifrost,app.kubernetes.io/component!=message-broker \
            -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}')
          for d in $DEPLOYMENTS; do
            echo "::group::rollout status $d"
            kubectl -n bifrost rollout status "deployment/$d" --timeout=5m
            echo "::endgroup::"
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "## Bifrost deploy"
            echo ""
            echo "- Commit: \`${GITHUB_SHA::7}\`"
            echo "- Cluster: \`${{ secrets.DO_CLUSTER_NAME }}\`"
            echo "- Namespace: \`bifrost\`"
            echo ""
            echo "### Deployment status"
            echo ""
            kubectl -n bifrost get deployment \
              -l app.kubernetes.io/part-of=bifrost,app.kubernetes.io/component!=message-broker \
              -o custom-columns=NAME:.metadata.name,READY:.status.readyReplicas,AVAILABLE:.status.availableReplicas,UPDATED:.status.updatedReplicas \
              || echo "kubectl unavailable"
          } >> "$GITHUB_STEP_SUMMARY"

  # =============================================================================
  # Build API Image - Only on version tags, after tests pass
  # =============================================================================
  build-api:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-unit, test-e2e-gate, lint]
    runs-on: ubuntu-latest
    name: Build API Image
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC for keyless cosign signing
      attestations: write # for actions/attest-build-provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Compute version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # Hard guard: plugin manifest versions must match the tag, otherwise
      # Claude Code and Codex plugin marketplaces can keep serving stale skill
      # content to users who installed via this repo. The bifrost-release skill
      # runs `scripts/update-plugin-version.sh <version>` locally before
      # tagging, so when this fails the maintainer either forgot the skill step
      # or the bump commit didn't make it onto the tagged ref.
      - name: Verify plugin manifest matches tag
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          failed=0
          for manifest in \
            .claude-plugin/plugin.json \
            .codex-plugin/plugin.json \
            plugins/bifrost/.codex-plugin/plugin.json; do
            manifest_version=$(jq -r '.version' "$manifest")
            if [[ "$manifest_version" != "$TAG_VERSION" ]]; then
              echo "::error::${manifest} version (${manifest_version}) does not match tag (${TAG_VERSION})."
              failed=1
            fi
          done
          if [[ "$failed" -ne 0 ]]; then
            echo "::error::Run 'scripts/update-plugin-version.sh $TAG_VERSION' on main, commit, then re-tag."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            # Semantic version tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # SHA for traceability
            type=sha
            # Latest tag only on stable releases (not pre-releases like v1.0.0-beta)
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push API image
        id: build-api
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BIFROST_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign API image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/${{ env.API_IMAGE }}@${{ steps.build-api.outputs.digest }}

      - name: Attest API image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ env.API_IMAGE }}
          subject-digest: ${{ steps.build-api.outputs.digest }}
          push-to-registry: true

      # ---------------------------------------------------------------------------
      # Transitional dual-publish to legacy ghcr.io/jackmusick/* namespace.
      # Sunset: remove after 2 stable releases or 60 days post-transfer.
      # ---------------------------------------------------------------------------
      - name: Dual-publish API release image to legacy jackmusick namespace
        env:
          GHCR_LEGACY_TOKEN: ${{ secrets.GHCR_LEGACY_TOKEN }}
        if: ${{ env.GHCR_LEGACY_TOKEN != '' }}
        run: |
          echo "$GHCR_LEGACY_TOKEN" | docker login ghcr.io -u jackmusick --password-stdin
          for tag in $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' '); do
            legacy_tag=$(echo "$tag" | sed "s|ghcr.io/${{ env.API_IMAGE }}|ghcr.io/${{ env.LEGACY_API_IMAGE }}|")
            docker pull "$tag"
            docker tag  "$tag" "$legacy_tag"
            docker push "$legacy_tag"
          done
          docker logout ghcr.io

  # =============================================================================
  # Build Client Image - Only on version tags, after tests pass
  # =============================================================================
  build-client:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-unit, test-e2e-gate, lint]
    runs-on: ubuntu-latest
    name: Build Client Image
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC for keyless cosign signing
      attestations: write # for actions/attest-build-provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Compute version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.CLIENT_IMAGE }}
          tags: |
            # Semantic version tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # SHA for traceability
            type=sha
            # Latest tag only on stable releases (not pre-releases like v1.0.0-beta)
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push client image
        id: build-client
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./client
          file: ./client/Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VITE_BIFROST_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign client image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/${{ env.CLIENT_IMAGE }}@${{ steps.build-client.outputs.digest }}

      - name: Attest client image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ env.CLIENT_IMAGE }}
          subject-digest: ${{ steps.build-client.outputs.digest }}
          push-to-registry: true

      # ---------------------------------------------------------------------------
      # Transitional dual-publish to legacy ghcr.io/jackmusick/* namespace.
      # Sunset: remove after 2 stable releases or 60 days post-transfer.
      # ---------------------------------------------------------------------------
      - name: Dual-publish client release image to legacy jackmusick namespace
        env:
          GHCR_LEGACY_TOKEN: ${{ secrets.GHCR_LEGACY_TOKEN }}
        if: ${{ env.GHCR_LEGACY_TOKEN != '' }}
        run: |
          echo "$GHCR_LEGACY_TOKEN" | docker login ghcr.io -u jackmusick --password-stdin
          for tag in $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' '); do
            legacy_tag=$(echo "$tag" | sed "s|ghcr.io/${{ env.CLIENT_IMAGE }}|ghcr.io/${{ env.LEGACY_CLIENT_IMAGE }}|")
            docker pull "$tag"
            docker tag  "$tag" "$legacy_tag"
            docker push "$legacy_tag"
          done
          docker logout ghcr.io

  # =============================================================================
  # Create GitHub Release - Only on version tags, after images are built.
  # Release assets are signed with Sigstore/cosign (keyless OIDC) and a SLSA
  # build provenance attestation is generated via GitHub's native attestation
  # action. Both feed Scorecard's Signed-Releases check.
  # =============================================================================
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-api, build-client]
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write       # upload assets to the GitHub Release
      id-token: write       # OIDC token for keyless cosign signing
      attestations: write   # actions/attest-build-provenance writes attestations

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          # Check if this is a pre-release (contains hyphen like v1.0.0-beta)
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Copy type stubs
        run: |
          if [ -f "stubs/bifrost.pyi" ]; then
            cp stubs/bifrost.pyi bifrost.pyi
          else
            echo "Warning: bifrost.pyi not found in stubs/, skipping"
          fi

      # Produce a reproducible source tarball as a primary release artifact so
      # Scorecard's Signed-Releases check has something concrete to verify
      # against (it ignores tag-only releases).
      - name: Build source tarball
        id: source_tarball
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TARBALL="bifrost-${VERSION}-source.tar.gz"
          git archive --format=tar.gz --prefix="bifrost-${VERSION}/" -o "${TARBALL}" HEAD
          sha256sum "${TARBALL}" | tee "${TARBALL}.sha256"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.4.1

      # Keyless OIDC signing: cosign exchanges the GitHub Actions OIDC token
      # for a short-lived Fulcio cert, signs, and records the signature in
      # Rekor. The .sigstore bundle is the format Scorecard's Signed-Releases
      # check recognizes (alongside .sig, .asc, .minisig, .sign).
      - name: Sign release artifacts with cosign
        run: |
          set -euo pipefail
          ARTIFACTS=("${{ steps.source_tarball.outputs.tarball }}")
          if [ -f "bifrost.pyi" ]; then
            ARTIFACTS+=("bifrost.pyi")
          fi
          for f in "${ARTIFACTS[@]}"; do
            cosign sign-blob --yes \
              --bundle "${f}.sigstore" \
              "${f}"
          done

      # SLSA build provenance — stored in GitHub's transparency log and
      # discoverable via `gh attestation verify`. Independent signal from the
      # cosign blob signatures above.
      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.source_tarball.outputs.tarball }}

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          files: |
            ${{ steps.source_tarball.outputs.tarball }}
            ${{ steps.source_tarball.outputs.tarball }}.sha256
            ${{ steps.source_tarball.outputs.tarball }}.sigstore
            bifrost.pyi
            bifrost.pyi.sigstore
            stubs/DISTRIBUTION.md
          fail_on_unmatched_files: false
          body: |
            ## Bifrost ${{ steps.get_version.outputs.version }}

            ### Docker Images

            **API:**
            ```bash
            docker pull ghcr.io/gobifrost/bifrost-api:${{ steps.get_version.outputs.version }}
            ```

            **Client:**
            ```bash
            docker pull ghcr.io/gobifrost/bifrost-client:${{ steps.get_version.outputs.version }}
            ```

            ### Type Stubs for IDEs
            Download `bifrost.pyi` from the assets below and place it in your workspace directory for IDE autocomplete and type checking support.

            See `DISTRIBUTION.md` for instructions.

            ### Signed artifacts (Sigstore / cosign — keyless)

            Each release asset has a matching `.sigstore` bundle (Sigstore's
            self-contained signature + certificate + Rekor inclusion proof,
            produced via keyless OIDC — no maintainer-held keys involved).

            Verify with cosign (>= v2.4):

            ```bash
            cosign verify-blob \
              --bundle bifrost-${{ steps.get_version.outputs.version }}-source.tar.gz.sigstore \
              --certificate-identity-regexp 'https://github\.com/gobifrost/bifrost/.*' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              bifrost-${{ steps.get_version.outputs.version }}-source.tar.gz
            ```

            A SLSA build-provenance attestation is also published and verifiable via:

            ```bash
            gh attestation verify bifrost-${{ steps.get_version.outputs.version }}-source.tar.gz \
              --owner gobifrost
            ```

          draft: false
          prerelease: ${{ steps.get_version.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
