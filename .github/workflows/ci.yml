name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    # Skip CI for documentation/config-only changes. The companion workflow
    # ci-noop.yml fires on these same paths and reports the same status-check
    # names (Lint & Type Check, Unit Tests, E2E Tests) so branch protection
    # still sees the required checks reported as green.
    #
    # IMPORTANT: do NOT add .github/workflows/** to this list — workflow
    # changes must always run CI so we catch CI-breaking edits before merge.
    paths-ignore:
      - "**/*.md"
      - ".claude/**"
      - "docs/**"
      - "LICENSE"
      - ".github/CODEOWNERS"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/dependabot.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: jackmusick/bifrost-api
  CLIENT_IMAGE: jackmusick/bifrost-client

permissions:
  contents: read

jobs:
  # =============================================================================
  # Lint & Type Check - Fast, gates all builds alongside unit tests
  # =============================================================================
  lint:
    runs-on: ubuntu-latest
    name: Lint & Type Check
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # Create .venv at the repo root so pyrightconfig.json's
      # `venvPath: ..` + `venv: .venv` resolves the same way locally and in CI.
      # Install runtime deps from the hash-pinned lock file (Scorecard
      # Pinned-Dependencies); pyright is installed separately because
      # --require-hashes forbids unpinned packages in the same invocation.
      - name: Install Python deps into .venv
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install --require-hashes -r requirements.lock
          ./.venv/bin/pip install pyright

      - name: Ruff
        working-directory: api
        run: ../.venv/bin/ruff check .

      - name: Pyright
        working-directory: api
        run: ../.venv/bin/pyright

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: TypeScript
        working-directory: client
        run: npm run tsc

      - name: ESLint
        working-directory: client
        run: npm run lint

  # =============================================================================
  # Unit Tests - Fast, gates all builds
  # =============================================================================
  test-unit:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run unit tests
        run: |
          chmod +x test.sh
          ./test.sh stack up
          ./test.sh unit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./coverage.xml
          flags: api
          name: api-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  # =============================================================================
  # E2E Tests - Slow, only gates tag releases
  # =============================================================================
  test-e2e:
    runs-on: ubuntu-latest
    name: E2E Tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run E2E tests
        run: |
          chmod +x test.sh
          ./test.sh stack up
          ./test.sh e2e

  # =============================================================================
  # Dev Build - Every push to main, gated by unit tests only
  # =============================================================================
  build-dev:
    if: github.ref == 'refs/heads/main'
    needs: [test-unit, lint]
    runs-on: ubuntu-latest
    name: Build Dev Images
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC for keyless cosign signing
      attestations: write # for actions/attest-build-provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "unknown")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Build and push API dev image
        id: build-api
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.API_IMAGE }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ env.API_IMAGE }}:dev
            ghcr.io/${{ env.API_IMAGE }}:sha-${{ steps.version.outputs.short_sha }}
          build-args: |
            BIFROST_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign API dev image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/${{ env.API_IMAGE }}@${{ steps.build-api.outputs.digest }}

      - name: Attest API dev image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ env.API_IMAGE }}
          subject-digest: ${{ steps.build-api.outputs.digest }}
          push-to-registry: true

      - name: Build and push client dev image
        id: build-client
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./client
          file: ./client/Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.CLIENT_IMAGE }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ env.CLIENT_IMAGE }}:dev
            ghcr.io/${{ env.CLIENT_IMAGE }}:sha-${{ steps.version.outputs.short_sha }}
          build-args: |
            VITE_BIFROST_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign client dev image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/${{ env.CLIENT_IMAGE }}@${{ steps.build-client.outputs.digest }}

      - name: Attest client dev image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ env.CLIENT_IMAGE }}
          subject-digest: ${{ steps.build-client.outputs.digest }}
          push-to-registry: true

  # =============================================================================
  # Deploy Dry Run - Manual trigger only (workflow_dispatch from any branch).
  # Validates the DO auth chain (token, cluster name, RBAC, label selector)
  # WITHOUT touching any deployment. Used once before merging this PR to
  # confirm the deploy job will succeed when it fires for real.
  # =============================================================================
  deploy-dry-run:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy Dry Run
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f # v2.5.2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save "${{ secrets.DO_CLUSTER_NAME }}"

      - name: Probe cluster reach + RBAC + label selector
        run: |
          set -e
          echo "::group::cluster info"
          kubectl cluster-info
          echo "::endgroup::"

          echo "::group::RBAC — can I patch deployments in the bifrost namespace?"
          kubectl auth can-i patch deployment -n bifrost
          echo "::endgroup::"

          echo "::group::Deployments the real job would restart"
          kubectl -n bifrost get deployment \
            -l app.kubernetes.io/part-of=bifrost,app.kubernetes.io/component!=message-broker \
            -o wide
          echo "::endgroup::"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Bifrost deploy dry run"
            echo ""
            echo "If the step above passed, the real \`deploy-dev\` job will work when this PR merges."
            echo ""
            echo "### Deployments that would be restarted"
            echo ""
            echo '```'
            kubectl -n bifrost get deployment \
              -l app.kubernetes.io/part-of=bifrost,app.kubernetes.io/component!=message-broker \
              -o custom-columns=NAME:.metadata.name,READY:.status.readyReplicas,AVAILABLE:.status.availableReplicas \
              || echo "kubectl unavailable"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # =============================================================================
  # Deploy Dev - Push-to-main only. Rolls the DigitalOcean deployment once
  # the :dev images are published. Targets anything labeled
  # `app.kubernetes.io/part-of=bifrost` in the `bifrost` namespace so new
  # services are picked up automatically. Failures page the maintainer via
  # GitHub's built-in workflow-failure email (no extra wiring).
  # =============================================================================
  deploy-dev:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [build-dev]
    runs-on: ubuntu-latest
    name: Deploy Dev to DigitalOcean
    # Allow only one deploy at a time; if a newer commit lands mid-rollout we
    # cancel the older deploy so the cluster always converges on HEAD of main.
    concurrency:
      group: deploy-dev
      cancel-in-progress: true

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f # v2.5.2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save "${{ secrets.DO_CLUSTER_NAME }}"

      - name: Roll deployments
        run: |
          kubectl -n bifrost rollout restart deployment \
            -l app.kubernetes.io/part-of=bifrost,app.kubernetes.io/component!=message-broker

      - name: Wait for rollouts
        run: |
          set -e
          # Query the same label selector we restarted, so new services are
          # picked up without editing this workflow.
          DEPLOYMENTS=$(kubectl -n bifrost get deployment \
            -l app.kubernetes.io/part-of=bifrost,app.kubernetes.io/component!=message-broker \
            -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}')
          for d in $DEPLOYMENTS; do
            echo "::group::rollout status $d"
            kubectl -n bifrost rollout status "deployment/$d" --timeout=5m
            echo "::endgroup::"
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "## Bifrost deploy"
            echo ""
            echo "- Commit: \`${GITHUB_SHA::7}\`"
            echo "- Cluster: \`${{ secrets.DO_CLUSTER_NAME }}\`"
            echo "- Namespace: \`bifrost\`"
            echo ""
            echo "### Deployment status"
            echo ""
            kubectl -n bifrost get deployment \
              -l app.kubernetes.io/part-of=bifrost,app.kubernetes.io/component!=message-broker \
              -o custom-columns=NAME:.metadata.name,READY:.status.readyReplicas,AVAILABLE:.status.availableReplicas,UPDATED:.status.updatedReplicas \
              || echo "kubectl unavailable"
          } >> "$GITHUB_STEP_SUMMARY"

  # =============================================================================
  # Build API Image - Only on version tags, after tests pass
  # =============================================================================
  build-api:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-unit, test-e2e, lint]
    runs-on: ubuntu-latest
    name: Build API Image
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC for keyless cosign signing
      attestations: write # for actions/attest-build-provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compute version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            # Semantic version tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # SHA for traceability
            type=sha
            # Latest tag only on stable releases (not pre-releases like v1.0.0-beta)
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push API image
        id: build-api
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BIFROST_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign API image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/${{ env.API_IMAGE }}@${{ steps.build-api.outputs.digest }}

      - name: Attest API image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ env.API_IMAGE }}
          subject-digest: ${{ steps.build-api.outputs.digest }}
          push-to-registry: true

  # =============================================================================
  # Build Client Image - Only on version tags, after tests pass
  # =============================================================================
  build-client:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-unit, test-e2e, lint]
    runs-on: ubuntu-latest
    name: Build Client Image
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC for keyless cosign signing
      attestations: write # for actions/attest-build-provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compute version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.CLIENT_IMAGE }}
          tags: |
            # Semantic version tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # SHA for traceability
            type=sha
            # Latest tag only on stable releases (not pre-releases like v1.0.0-beta)
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push client image
        id: build-client
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./client
          file: ./client/Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VITE_BIFROST_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign client image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/${{ env.CLIENT_IMAGE }}@${{ steps.build-client.outputs.digest }}

      - name: Attest client image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ env.CLIENT_IMAGE }}
          subject-digest: ${{ steps.build-client.outputs.digest }}
          push-to-registry: true

  # =============================================================================
  # Create GitHub Release - Only on version tags, after images are built
  # =============================================================================
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-api, build-client]
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          # Check if this is a pre-release (contains hyphen like v1.0.0-beta)
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Copy type stubs
        run: |
          if [ -f "stubs/bifrost.pyi" ]; then
            cp stubs/bifrost.pyi bifrost.pyi
          else
            echo "Warning: bifrost.pyi not found in stubs/, skipping"
          fi

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          files: |
            bifrost.pyi
            stubs/DISTRIBUTION.md
          body: |
            ## Bifrost ${{ steps.get_version.outputs.version }}

            ### Docker Images

            **API:**
            ```bash
            docker pull jackmusick/bifrost-api:${{ steps.get_version.outputs.version }}
            ```

            **Client:**
            ```bash
            docker pull jackmusick/bifrost-client:${{ steps.get_version.outputs.version }}
            ```

            ### Type Stubs for IDEs
            Download `bifrost.pyi` from the assets below and place it in your workspace directory for IDE autocomplete and type checking support.

            See `DISTRIBUTION.md` for instructions.

          draft: false
          prerelease: ${{ steps.get_version.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
