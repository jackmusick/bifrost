# OpenSSF Scorecard
# Reference: https://github.com/ossf/scorecard-action
#
# Publishes results to:
#   - GitHub Security tab → Code scanning (under "scorecard")
#   - https://api.securityscorecards.dev/projects/github.com/jackmusick/bifrost
#
# The README badge auto-updates from the public API.

name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 10 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # required to upload SARIF to code-scanning
      id-token: write # required for Sigstore OIDC publish_results
      contents: read
      actions: read # required by scorecard-action to read workflow metadata
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: results.sarif
