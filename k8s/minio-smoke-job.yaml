apiVersion: batch/v1
kind: Job
metadata:
  name: minio-smoke-test
  namespace: bifrost
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          image: python:3.11-slim
          envFrom:
            - secretRef:
                name: bifrost-secrets
          command:
            - bash
            - -c
            - "set -euo pipefail; pip install --no-cache-dir boto3 >/dev/null 2>&1 || true; python3 -c \"import os,sys,time,traceback; import boto3; endpoint=os.environ.get('BIFROST_S3_ENDPOINT_URL'); ak=os.environ.get('BIFROST_S3_ACCESS_KEY'); sk=os.environ.get('BIFROST_S3_SECRET_KEY'); bucket=os.environ.get('BIFROST_S3_BUCKET'); print('endpoint',endpoint); print('bucket',bucket);\nif not (endpoint and ak and sk and bucket):\n    print('Missing env for smoke test', endpoint, ak is not None, sk is not None, bucket); sys.exit(2);\ntry:\n    s3=boto3.client('s3',aws_access_key_id=ak,aws_secret_access_key=sk,endpoint_url=endpoint);\n    key=\'smoke-{}\'.format(int(time.time()));\n    s3.put_object(Bucket=bucket,Key=key,Body=b'test');\n    resp=s3.list_objects_v2(Bucket=bucket,Prefix=key,MaxKeys=1);\n    print('LIST', resp.get('KeyCount'));\n    if resp.get('KeyCount',0) < 1:\n        print('Put succeeded but key not found');\n        sys.exit(1);\n    print('Smoke test OK');\n    sys.exit(0);\nexcept Exception as e:\n    print('EXC',type(e),e);\n    traceback.print_exc();\n    sys.exit(1)\""