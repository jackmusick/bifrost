apiVersion: apps/v1
kind: Deployment
metadata:
  name: bifrost-client
  namespace: bifrost
  labels:
    app.kubernetes.io/name: bifrost-client
    app.kubernetes.io/component: client
    app.kubernetes.io/part-of: bifrost
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: bifrost-client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bifrost-client
        app.kubernetes.io/component: client
        app.kubernetes.io/part-of: bifrost
    spec:
      # Shutdown budget: preStop (5s) + nginx graceful (~30s default) + headroom
      terminationGracePeriodSeconds: 35
      containers:
        - name: client
          image: ghcr.io/gobifrost/bifrost-client:latest
          ports:
            - containerPort: 80
              name: http
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
