# Keep tests and generated types out of source quality-gate metrics; Sonar
# still analyzes explicitly scoped tests with test-code rules and metrics.
sonar.sources=api,apps,client/src
sonar.tests=api/tests,client/e2e,client/src
sonar.test.inclusions=api/tests/**,client/e2e/**,client/src/**/*.test.ts,client/src/**/*.test.tsx
sonar.exclusions=scripts/docs/**,client/e2e/docs/**,api/tests/**,client/e2e/**,client/src/**/*.test.ts,client/src/**/*.test.tsx,client/src/lib/v1.d.ts
sonar.cpd.exclusions=api/tests/**,client/e2e/**,client/src/**/*.test.ts,client/src/**/*.test.tsx,client/src/lib/v1.d.ts

# Unit tests intentionally use http:// fixture URLs to exercise CLI endpoint
# handling. Keep python:S5332 noise out of the PR quality gate for test code.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.e1.resourceKey=api/tests/**
