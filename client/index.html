<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/logo.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Bifrost Integrations</title>
		<!--
			Static import map for app-bundler externals. Resolved here so that
			Firefox 150 (which enforces the legacy single-map rule when
			dom.multiple_import_maps.enabled is off) accepts the map before any
			module loads start. Each URL serves a small ESM stub generated by
			the bifrost-module-stubs Vite plugin; stubs read from
			globalThis.__bifrost_* populated by initReactShim() at boot.
		-->
		<script type="importmap">
			{
				"imports": {
					"react": "/__bifrost_modules/react.js",
					"react-dom": "/__bifrost_modules/react-dom.js",
					"react-dom/client": "/__bifrost_modules/react-dom-client.js",
					"react/jsx-runtime": "/__bifrost_modules/react-jsx-runtime.js",
					"react/jsx-dev-runtime": "/__bifrost_modules/react-jsx-dev-runtime.js",
					"react-router-dom": "/__bifrost_modules/react-router-dom.js",
					"lucide-react": "/__bifrost_modules/lucide-react.js"
				}
			}
		</script>
	</head>

	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
